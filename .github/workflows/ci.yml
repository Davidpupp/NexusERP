name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: nexuserp

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexuserp
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-32x
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexuserp/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test
      - run: npx tsc --noEmit
      - run: npx eslint src --max-warnings=0
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexuserp
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-32x
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CI: "true"
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexuserp
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexuserp/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run db:migrate:deploy
      - run: npm run db:seed
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
